<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Obrigado — Pousada Jardim Monte Verde</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    @font-face {
      font-family: 'Bethia';
      src: url('https://giuiia.github.io/LP-jardim-EarlyBooking/bethia/Bethia.otf') format('opentype'),
           url('https://giuiia.github.io/LP-jardim-EarlyBooking/bethia/Bethia.ttf') format('truetype');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --verde:     #0C2C28;
      --ambar:     #D48D4A;
      --terracota: #9A4B2A;
      --creme:     #F1E4D3;
      --branco:    #FFFFFF;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Raleway', sans-serif;
      background: var(--verde);
      color: var(--branco);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 24px;
    }

    .logo {
      width: 140px;
      margin-bottom: 40px;
      filter: brightness(0) invert(1);
    }

    .check-icon {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--ambar);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }

    .check-icon svg {
      width: 36px;
      height: 36px;
    }

    h1 {
      font-family: 'Bethia', serif;
      font-size: clamp(32px, 6vw, 52px);
      font-weight: normal;
      color: var(--ambar);
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 16px;
      color: rgba(255,255,255,0.8);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #25D366;
      color: #fff;
      text-decoration: none;
      font-family: 'Raleway', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 16px 32px;
      border-radius: 8px;
      margin-bottom: 24px;
      transition: background 0.2s;
    }

    .cta-btn:hover { background: #1ebe5a; }

    .cta-btn svg { width: 22px; height: 22px; fill: white; flex-shrink: 0; }

    .back-link {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      margin-top: 8px;
    }

    .back-link:hover { color: rgba(255,255,255,0.7); }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--ambar);
      margin: 32px auto;
      opacity: 0.4;
    }

    .note {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      max-width: 360px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <img src="https://giuiia.github.io/LP-jardim-EarlyBooking/jardim_logo.png" alt="Pousada Jardim Monte Verde" class="logo" />

  <div class="check-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>

  <h1>Interesse registrado!</h1>

  <p class="subtitle">
    Obrigada pelo interesse. Em breve entraremos em contato<br>
    para garantir sua reserva com condições especiais de Early Booking.
  </p>

  <a class="cta-btn"
     href="https://api.whatsapp.com/send?phone=553534381350&text=Ol%C3%A1%21+Tenho+interesse+em+reservar+na+Pousada+Jardim+Monte+Verde+%F0%9F%8C%BF&utm_source=lp_early_booking&utm_medium=obrigado&utm_campaign=early_booking_2026"
     target="_blank" rel="noopener">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.555 4.116 1.524 5.843L.057 23.743a.5.5 0 0 0 .63.612l6.094-1.596A11.94 11.94 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.894a9.875 9.875 0 0 1-5.032-1.374l-.36-.214-3.733.978.996-3.636-.235-.374A9.868 9.868 0 0 1 2.106 12C2.106 6.533 6.533 2.106 12 2.106S21.894 6.533 21.894 12 17.467 21.894 12 21.894z"/>
    </svg>
    Falar com a pousada
  </a>

  <div class="divider"></div>

  <p class="note">
    Para dúvidas, entre em contato pelo WhatsApp ou Instagram <strong>@pousadajardimmv</strong>.
  </p>

  <br>
  <a href="https://giuiia.github.io/LP-jardim-EarlyBooking/lp-early-booking-2026.html" class="back-link">← Voltar para a oferta</a>

</body>
</html>
